function notaFmt(v) { return Number(v).toFixed(1).replace('.', ','); }
function pctFmt(v) { return Math.round(v) + '%'; }
function initials(name) { return (name || '').split(/\s+/).filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase(); }
function normRut(x) { return String(x || '').replace(/[.\-\s]/g, '').toUpperCase(); }
function rutValido(x) { return normRut(x).length >= 7; }
function gruposDe(carrera) { const g = roster[carrera]; return g ? Object.keys(g) : []; }
function carreraLabelOf(code) { return (carreras.find(c => c.code === code) || {}).label || ''; }
function notaColorFor(v) { if (v >= 6) return '#2a7d5b'; if (v >= 4) return '#2a4a7f'; return '#b25f3a'; }
function escapeHtml(str) {
  return String(str == null ? '' : str).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}
function titleCase(s) {
  const low = new Set(['de', 'del', 'la', 'las', 'los', 'y', 'da', 'di']);
  return s.toLowerCase().split(/\s+/).filter(Boolean).map((w, i) => {
    if (i > 0 && low.has(w)) return w;
    if (w.includes('-')) return w.split('-').map(p => p ? p[0].toUpperCase() + p.slice(1) : p).join('-');
    return w ? w[0].toUpperCase() + w.slice(1) : w;
  }).join(' ');
}
// Nómina viene "APELLIDO APELLIDO NOMBRE(S)" -> mostrar "Nombre(s) Apellidos"
function displayName(canon) {
  const clean = String(canon || '').replace(/\./g, ' ').replace(/\s+/g, ' ').trim();
  const parts = clean.split(' ');
  if (parts.length <= 2) return titleCase(clean);
  const apellidos = parts.slice(0, 2);
  const nombres = parts.slice(2);
  return titleCase(nombres.concat(apellidos).join(' '));
}

const STORAGE_KEY = 'evalIntragrupal.local.v1';
function loadLocal() {

  catch (e) { return []; }
}

function markLocalSynced(id) { saveLocalAll(loadLocal().map(r => r.id === id ? { ...r, synced: true } : r)); }

/* =========================================================================
   SINCRONIZACIÓN REMOTA (Google Sheets vía Apps Script)
   ========================================================================= */
/**
 * Google Apps Script bajo cuentas institucionales (Workspace) frecuentemente
 * NO entrega los headers CORS que fetch()/XHR necesitan, aun con el despliegue
 * en "Cualquier usuario". Para evitar depender de eso por completo, leemos con
 * JSONP (un <script> cargado dinámicamente — nunca sujeto a CORS) y escribimos
 * con un formulario oculto enviado a un iframe invisible (una navegación real,
 * tampoco sujeta a CORS). Después de escribir, verificamos por separado que el
 * registro efectivamente llegó, reintentando unas pocas veces.
 */
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = 'jsonp_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const script = document.createElement('script');
    let done = false;
    const cleanup = () => { try { delete window[cbName]; } catch (e) {} script.remove(); };
    window[cbName] = (data) => { done = true; cleanup(); resolve(data); };
    script.onerror = () => { if (!done) { cleanup(); reject(new Error('JSONP_LOAD_ERROR')); } };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    document.body.appendChild(script);
    setTimeout(() => { if (!done) { cleanup(); reject(new Error('JSONP_TIMEOUT')); } }, 15000);
  });
}

function submitViaHiddenForm(record) {
  const iframeName = 'sync_iframe_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  const iframe = document.createElement('iframe');
  iframe.name = iframeName;
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = CONFIG.SHEET_WEBAPP_URL;
  form.target = iframeName;
  form.style.display = 'none';

  const addField = (name, value) => {
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = name; inp.value = value;
    form.appendChild(inp);
  };
  addField('action', 'append');
  addField('payload', JSON.stringify(record));

  document.body.appendChild(form);
  form.submit();
  setTimeout(() => { form.remove(); iframe.remove(); }, 5000);
}

function checkExists(id) {
  return jsonp(CONFIG.SHEET_WEBAPP_URL + '?action=check&id=' + encodeURIComponent(id)).then(data => {
    if (!data || data.ok !== true) throw new Error((data && data.error) || 'RESPUESTA_INVALIDA');
    return !!data.exists;
  });
}

async function syncOne(resp) {
  if (!CONFIG.SHEET_WEBAPP_URL) throw new Error('NO_CONFIG');
  submitViaHiddenForm(resp);
  for (let i = 0; i < 6; i++) {
    await new Promise(r => setTimeout(r, 1200));
    try {
      const exists = await checkExists(resp.id);
      if (exists) return { ok: true };
    } catch (e) { /* reintenta */ }
  }
  throw new Error('NO_CONFIRMADO');
}

function fetchRemoteAll(token) {
  if (!CONFIG.SHEET_WEBAPP_URL) return Promise.reject(new Error('NO_CONFIG'));
  const url = CONFIG.SHEET_WEBAPP_URL + '?action=list&token=' + encodeURIComponent(token || '');
  return jsonp(url).then(data => {
    if (!data || data.ok !== true) {
      if (data && data.error === 'no autorizado') throw new Error('NO_AUTORIZADO');
      throw new Error((data && data.error) || 'RESPUESTA_INVALIDA');
    }
    return data.records || [];
  });
}

const TEACHER_TOKEN_KEY = 'evalIntragrupal.teacherToken';
async function ensureTeacherToken() {
  let t = localStorage.getItem(TEACHER_TOKEN_KEY);
  if (!t) {
    t = prompt('Ingresa la clave de docente para ver los resultados:');
    if (t) localStorage.setItem(TEACHER_TOKEN_KEY, t);
  }
  return t || '';
}

function friendlySyncError(err) {
  const m = String(err && err.message);
  if (m === 'NO_CONFIG') return 'La app aún no está conectada a la planilla (falta configurar SHEET_WEBAPP_URL). Revisa INSTRUCCIONES.md.';
  if (m === 'NO_CONFIRMADO') return 'Se envió, pero no pudimos confirmar que llegó a la planilla todavía. Presiona Reintentar (no se duplicará si ya había llegado).';
  if (m === 'NO_AUTORIZADO') return 'Clave de docente incorrecta. Presiona Actualizar para ingresarla de nuevo.';
  return 'No se pudo conectar con la planilla. Revisa tu conexión e inténtalo de nuevo.';
}

function startEval() {
  const { carrera, grupo } = state;
  const raw = (roster[carrera] && roster[carrera][grupo]) ? roster[carrera][grupo] : [];
  if (!raw.length) return;
  const members = raw.map(m => ({ name: displayName(m.c), canon: m.c, rut: m.r }));
  const ratings = {};
  members.forEach(m => ratings[m.canon] = { desempeno: 4, cumplimiento: 4, equipo: 4, contribucion: 100 });
  setState({ members, ratings, memberIndex: 0, screen: 'eval' });
  window.scrollTo({ top: 0 });
}

function setCurrentRating(key, val) {
  const m = state.members[state.memberIndex];
  state.ratings[m.canon] = { ...state.ratings[m.canon], [key]: val };
}

function nextMember() {
  const i = state.memberIndex;
  if (i < state.members.length - 1) setState({ memberIndex: i + 1 });
  else setState({ screen: 'observaciones' });
  window.scrollTo({ top: 0 });
}
function prevMember() {
  const i = state.memberIndex;
  if (i > 0) setState({ memberIndex: i - 1 });
  else setState({ screen: 'inicio' });
  window.scrollTo({ top: 0 });
}

async function submit() {
  const { nombre, rut, carrera, grupo, members, ratings, observaciones } = state;
  const resp = {
    id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
    ts: new Date().toISOString(),
    nombre, rut, carrera, grupo,
    members: members.map(m => ({ name: m.name, canon: m.canon, rut: m.rut })),
    ratings: JSON.parse(JSON.stringify(ratings)),
    observaciones
  };
  saveLocalOne({ ...resp, synced: false });
  setState({ submitting: true, submitError: '', lastSubmitted: resp });
  try {
    await syncOne(resp);
    markLocalSynced(resp.id);
    setState({ submitting: false, submitError: '', screen: 'enviado' });
  } catch (err) {
    setState({ submitting: false, submitError: friendlySyncError(err) });
  }
}

function retrySubmit() {
  if (!state.lastSubmitted) return;
  setState({ submitting: true, submitError: '' });
  syncOne(state.lastSubmitted).then(() => {
    markLocalSynced(state.lastSubmitted.id);
    setState({ submitting: false, submitError: '', screen: 'enviado' });
  }).catch(err => setState({ submitting: false, submitError: friendlySyncError(err) }));
}

function restart() {
  setState({ screen: 'inicio', nombre: '', rut: '', carrera: '', grupo: '', members: [], ratings: {}, observaciones: '', memberIndex: 0, submitError: '' });
}

function downloadOwn() {
  const last = state.lastSubmitted;
  if (!last) return;
  downloadFile('mi_evaluacion.csv', '\ufeff' + toCSV(csvRows([last])), 'text/csv;charset=utf-8');
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
function csvRows(responses) {
  const head = ['Fecha', 'Evaluador', 'RUT evaluador', 'Carrera', 'Grupo', 'Integrante evaluado', 'RUT integrante', 'Desempeño', 'Cumplimiento', 'Trabajo en equipo', 'Nota criterios', '% contribución', 'Observaciones grupo'];
  const rows = [head];
  for (const r of responses) {
    const info = {};
    (r.members || []).forEach(m => info[m.canon] = m);
    for (const [canon, rt] of Object.entries(r.ratings || {})) {
      const mi = info[canon] || { name: canon, rut: '' };
      const nota = (Number(rt.desempeno) + Number(rt.cumplimiento) + Number(rt.equipo)) / 3;
      rows.push([(r.ts || '').slice(0, 10), r.nombre, r.rut || '', carreraLabelOf(r.carrera), r.grupo, mi.name, mi.rut || '', notaFmt(rt.desempeno), notaFmt(rt.cumplimiento), notaFmt(rt.equipo), notaFmt(nota), Math.round(rt.contribucion) + '%', (r.observaciones || '').replace(/\s+/g, ' ').trim()]);
    }
  }
  return rows;
}
function toCSV(rows) {
  return rows.map(row => row.map(c => { const s = String(c == null ? '' : c); return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }).join(';')).join('\n');
}
function exportCSV() { downloadFile('evaluaciones_intragrupales.csv', '\ufeff' + toCSV(csvRows(state.responses)), 'text/csv;charset=utf-8'); }
function exportJSON() { downloadFile('respaldo_evaluaciones.json', JSON.stringify(state.responses, null, 2), 'application/json'); }

async function importJSONFile(file) {
  if (!file) return;
  const text = await file.text();
  let imported;
  try { imported = JSON.parse(text); } catch (e) { alert('El archivo no es un JSON válido.'); return; }
  if (!Array.isArray(imported)) { alert('El respaldo debe ser una lista de evaluaciones.'); return; }
  setState({ resultLoading: true, resultError: '' });
  let okCount = 0, failCount = 0;
  for (const rec of imported) {
    try { await syncOne(rec); okCount++; } catch (e) { failCount++; }
  }
  await refreshResultados();
  alert('Importación completa: ' + okCount + ' registradas' + (failCount ? ', ' + failCount + ' con error' : '') + '.');
}

function aggregate() {
  const map = {};
  for (const r of state.responses) {
    const gk = r.carrera + '|' + r.grupo;
    if (!map[gk]) map[gk] = { carrera: r.carrera, grupo: r.grupo, key: gk, evaluators: 0, members: {}, obs: [] };
    map[gk].evaluators++;
    if (r.observaciones && r.observaciones.trim()) map[gk].obs.push(r.observaciones.trim());
    const info = {};
    (r.members || []).forEach(m => info[m.canon] = m);
    for (const [canon, rt] of Object.entries(r.ratings || {})) {
      const mi = info[canon] || { name: canon, canon, rut: '' };
      if (!map[gk].members[canon]) map[gk].members[canon] = { name: mi.name, rut: mi.rut, cnt: 0, d: 0, c: 0, e: 0, pct: 0, nota: 0 };
      const mm = map[gk].members[canon];
      const nota = (Number(rt.desempeno) + Number(rt.cumplimiento) + Number(rt.equipo)) / 3;
      mm.nota += nota; mm.d += Number(rt.desempeno); mm.c += Number(rt.cumplimiento); mm.e += Number(rt.equipo); mm.pct += Number(rt.contribucion); mm.cnt++;
    }
  }
  return Object.values(map).map(g => {
    const members = Object.values(g.members).map(m => {
      const nf = m.nota / m.cnt;
      return { name: m.name, rut: m.rut, count: m.cnt, desempeno: notaFmt(m.d / m.cnt), cumplimiento: notaFmt(m.c / m.cnt), equipo: notaFmt(m.e / m.cnt), notaFinal: notaFmt(nf), notaFinalNum: nf, notaColor: notaColorFor(nf), contribucion: pctFmt(m.pct / m.cnt) };
    }).sort((a, b) => a.name.localeCompare(b.name));
    const notaGrupo = members.length ? notaFmt(members.reduce((s, m) => s + m.notaFinalNum, 0) / members.length) : '—';
    return { title: carreraLabelOf(g.carrera) + ' · Grupo ' + g.grupo, evaluators: g.evaluators, members, notaGrupo, obs: g.obs, obsCount: g.obs.length, hasObs: g.obs.length > 0 };
  }).sort((a, b) => a.title.localeCompare(b.title));
}

async function goResultados() {

async function refreshResultados() {
  const token = await ensureTeacherToken();
  if (!token) { setState({ resultLoading: false, resultError: 'Necesitas la clave de docente para ver resultados.' }); return; }
  setState({ resultLoading: true, resultError: '' });
  try {
    const records = await fetchRemoteAll(token);
    setState({ responses: records, resultLoading: false });
  } catch (err) {
    if (String(err.message) === 'NO_AUTORIZADO') localStorage.removeItem(TEACHER_TOKEN_KEY);
    setState({ resultLoading: false, resultError: friendlySyncError(err) });
  }
}

        ${s.carrera ? `
        <div>
          <label style="display:block; font-size:13px; font-weight:600; color:#3a3527; margin-bottom:9px;">Número de grupo</label>
          <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px;">${grupoChips}</div>
        </div>` : ''}

        ${membersExist ? `
        <div style="background:#f4f1ea; border:1px solid #e6e0d3; border-radius:10px; padding:16px 18px; margin-bottom:24px;">
          <div style="font-size:12px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:#8a8270; margin-bottom:10px;">Integrantes que evaluarás</div>
          <div style="display:flex; flex-direction:column; gap:6px;">${rosterHtml}</div>
        </div>` : ''}

        <button id="start-btn" data-action="startEval" ${startOk ? '' : 'disabled'} style="width:100%; border:none; border-radius:10px; padding:14px; font-family:inherit; font-size:15px; font-weight:700; cursor:${startOk ? 'pointer' : 'not-allowed'}; background:${startOk ? '#2a4a7f' : '#c7cdd6'}; color:#fff;">Comenzar evaluación →</button>
      </div>
    </div>`;
}

function renderEval() {
  const s = state;
  const currentMemberObj = s.members[s.memberIndex] || null;
  const currentMember = currentMemberObj ? currentMemberObj.name : '';
  const curR = (currentMemberObj && s.ratings[currentMemberObj.canon]) || {};
  const membersCount = s.members.length;
  const isLast = s.memberIndex === membersCount - 1;
  const progressPct = Math.round((s.memberIndex / Math.max(membersCount, 1)) * 100) + '%';
  const isSelf = !!(currentMemberObj && ((rutValido(s.rut) && normRut(currentMemberObj.rut) === normRut(s.rut)) || (s.nombre.trim() && currentMemberObj.name.toLowerCase() === s.nombre.trim().toLowerCase())));

  const criteriosHtml = criterios.map(c => {
    const v = curR[c.key];
    const display = c.type === 'pct' ? pctFmt(v) : notaFmt(v);
    const min = c.type === 'pct' ? 0 : 1, max = c.type === 'pct' ? 100 : 7, step = c.type === 'pct' ? 5 : 0.1;
    return `
      <div style="padding:18px 0; border-bottom:1px solid #f1ece0;">
        <div style="display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:4px;">
          <div style="font-size:15.5px; font-weight:600; color:#23324d;">${escapeHtml(c.label)}</div>
          <div id="crit-display-${c.key}" style="font-family:'Source Serif 4', serif; font-size:22px; font-weight:700; color:#2a4a7f; min-width:58px; text-align:right;">${display}</div>
        </div>
        <div style="font-size:13px; line-height:1.5; color:#6b6456; margin-bottom:14px;">${escapeHtml(c.desc)}</div>
        <input type="range" min="${min}" max="${max}" step="${step}" value="${v}" data-action="ratingInput" data-key="${c.key}" style="width:100%; height:22px; cursor:pointer;">
        <div style="display:flex; justify-content:space-between; font-size:11.5px; color:#a49a85; margin-top:2px;">
          <span>${escapeHtml(c.low)}</span><span>${escapeHtml(c.high)}</span>
        </div>
      </div>`;
  }).join('');

  return `
    <div style="width:100%; max-width:640px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <div style="font-size:12.5px; font-weight:600; letter-spacing:0.4px; text-transform:uppercase; color:#8a8270;">Integrante ${s.memberIndex + 1} de ${membersCount}</div>
        <div style="font-size:12.5px; color:#8a8270;">${escapeHtml(carreraLabelOf(s.carrera))} · Grupo ${escapeHtml(s.grupo)}</div>
      </div>
      <div style="height:6px; background:#e2ddd2; border-radius:999px; overflow:hidden; margin-bottom:22px;">
        <div style="height:100%; background:#2a4a7f; border-radius:999px; width:${progressPct};"></div>
      </div>

      <div style="background:#fff; border:1px solid #e2ddd2; border-radius:14px; padding:28px 28px 30px; box-shadow:0 1px 2px rgba(30,40,60,0.04);">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:6px;">
          <div style="width:42px; height:42px; border-radius:50%; background:#22365c; color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Source Serif 4', serif; font-size:17px; font-weight:600;">${escapeHtml(initials(currentMember))}</div>
          <div>
            <div style="font-family:'Source Serif 4', serif; font-size:21px; font-weight:600; line-height:1.1;">${escapeHtml(currentMember)}</div>
            ${isSelf ? `<div style="font-size:12px; color:#2a7d5b; font-weight:600; margin-top:2px;">Autoevaluación</div>` : ''}
          </div>
        </div>

        <div style="height:1px; background:#eee7d9; margin:20px 0 6px;"></div>

        ${criteriosHtml}

        <div style="display:flex; gap:12px; margin-top:24px;">
          <button data-action="prevMember" style="flex:0 0 auto; background:#fff; color:#4a4636; border:1px solid #d8d2c4; border-radius:10px; padding:13px 20px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer;">← Atrás</button>
          <button data-action="nextMember" style="flex:1; background:#2a4a7f; color:#fff; border:none; border-radius:10px; padding:13px 20px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer;">${isLast ? 'Continuar →' : 'Siguiente →'}</button>
        </div>
      </div>
    </div>`;
}

function renderObservaciones() {
  const s = state;
  return `
    <div style="width:100%; max-width:620px;">
      <div style="background:#fff; border:1px solid #e2ddd2; border-radius:14px; padding:32px; box-shadow:0 1px 2px rgba(30,40,60,0.04);">
        <div style="font-family:'Source Serif 4', serif; font-size:23px; font-weight:600; margin-bottom:8px;">Observaciones del grupo</div>
        <p style="font-size:14px; line-height:1.6; color:#5c5648; margin:0 0 20px;">Opcional. Comenta cómo funcionó el equipo, dificultades o aspectos a destacar. Solo lo verá el equipo docente.</p>
        <textarea data-action="obsInput" placeholder="Escribe aquí (opcional)…" style="width:100%; min-height:150px; padding:14px; border:1px solid #d8d2c4; border-radius:10px; font-family:inherit; font-size:15px; line-height:1.5; color:#212b3b; background:#faf9f5; resize:vertical;">${escapeHtml(s.observaciones)}</textarea>
        <div style="display:flex; gap:12px; margin-top:22px;">
          <button data-action="backToEval" style="flex:0 0 auto; background:#fff; color:#4a4636; border:1px solid #d8d2c4; border-radius:10px; padding:13px 20px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer;">← Atrás</button>
          <button data-action="goRevision" style="flex:1; background:#2a4a7f; color:#fff; border:none; border-radius:10px; padding:13px 20px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer;">Revisar y enviar →</button>
        </div>
      </div>
    </div>`;
}

function renderRevision() {
  const s = state;
  const reviewMembers = s.members.map(m => {
    const rt = s.ratings[m.canon] || {};
    const nota = (Number(rt.desempeno) + Number(rt.cumplimiento) + Number(rt.equipo)) / 3;
    return { name: m.name, nota: notaFmt(nota), contribucion: pctFmt(rt.contribucion), desempeno: notaFmt(rt.desempeno), cumplimiento: notaFmt(rt.cumplimiento), equipo: notaFmt(rt.equipo) };
  });
  const rows = reviewMembers.map(m => `
    <div style="border:1px solid #ece6d8; border-radius:11px; padding:15px 17px; margin-bottom:12px; background:#faf9f5;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
        <div style="font-size:15.5px; font-weight:600; color:#23324d;">${escapeHtml(m.name)}</div>
        <div style="display:flex; align-items:center; gap:10px;">
          <div style="font-family:'Source Serif 4', serif; font-size:20px; font-weight:700; color:#2a4a7f;">${m.nota}</div>
          <div style="font-size:12px; color:#6b6456; background:#eef1f6; border-radius:6px; padding:3px 8px; font-weight:600;">${m.contribucion}</div>
        </div>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:6px 16px; font-size:12.5px; color:#6b6456;">
        <span>Desempeño <strong style="color:#3a3527;">${m.desempeno}</strong></span>
        <span>Cumplimiento <strong style="color:#3a3527;">${m.cumplimiento}</strong></span>
        <span>Trabajo en equipo <strong style="color:#3a3527;">${m.equipo}</strong></span>
      </div>
    </div>`).join('');

  const errorBanner = s.submitError ? `
    <div style="background:#fbeee7; border:1px solid #e6c3ac; color:#7a3a1a; border-radius:10px; padding:12px 14px; font-size:13.5px; margin-top:16px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
      <span>${escapeHtml(s.submitError)}</span>
      <button data-action="retrySubmit" style="background:#fff; color:#7a3a1a; border:1px solid #e6c3ac; border-radius:8px; padding:7px 14px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;">Reintentar</button>
    </div>` : '';

  return `
    <div style="width:100%; max-width:680px;">
      <div style="background:#fff; border:1px solid #e2ddd2; border-radius:14px; padding:32px; box-shadow:0 1px 2px rgba(30,40,60,0.04);">
        <div style="font-family:'Source Serif 4', serif; font-size:23px; font-weight:600; margin-bottom:4px;">Revisa tu evaluación</div>
        <p style="font-size:13.5px; color:#7a7362; margin:0 0 22px;">Nota = promedio de Desempeño, Cumplimiento y Trabajo en equipo.</p>
        ${rows}
        <div style="display:flex; gap:12px; margin-top:20px;">
          <button data-action="backToObs" style="flex:0 0 auto; background:#fff; color:#4a4636; border:1px solid #d8d2c4; border-radius:10px; padding:13px 20px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer;">← Atrás</button>
          <button data-action="submit" ${s.submitting ? 'disabled' : ''} style="flex:1; background:#2a7d5b; color:#fff; border:none; border-radius:10px; padding:13px 20px; font-family:inherit; font-size:15px; font-weight:700; cursor:${s.submitting ? 'default' : 'pointer'};">${s.submitting ? 'Enviando…' : 'Enviar evaluación ✓'}</button>
        </div>
        ${errorBanner}
      </div>
    </div>`;
}

function renderEnviado() {
  return `
    <div style="width:100%; max-width:520px; text-align:center;">
      <div style="background:#fff; border:1px solid #e2ddd2; border-radius:14px; padding:44px 34px; box-shadow:0 1px 2px rgba(30,40,60,0.04);">
        <div style="width:62px; height:62px; border-radius:50%; background:#e6f2ec; color:#2a7d5b; display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 20px;">✓</div>
        <div style="font-family:'Source Serif 4', serif; font-size:24px; font-weight:600; margin-bottom:10px;">¡Evaluación enviada!</div>
        <p style="font-size:14.5px; line-height:1.6; color:#5c5648; margin:0 0 26px;">Gracias. Tu evaluación quedó registrada de forma anónima.</p>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <button data-action="downloadOwn" style="background:#fff; color:#2a4a7f; border:1px solid #c3cede; border-radius:10px; padding:12px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;">Descargar mi evaluación (CSV)</button>
          <button data-action="restart" style="background:#2a4a7f; color:#fff; border:none; border-radius:10px; padding:12px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;">Nueva evaluación</button>
        </div>
      </div>
    </div>`;
}

function renderResultados() {
  const s = state;
  const aggGroups = aggregate();
  const hasResults = aggGroups.length > 0;

  let body;
  if (s.resultLoading) {
    body = `<div style="background:#fff; border:1px dashed #d8d2c4; border-radius:14px; padding:54px 30px; text-align:center;"><div style="font-size:15px; color:#8a8270;">Cargando resultados…</div></div>`;
  } else if (s.resultError) {
    body = `<div style="background:#fbeee7; border:1px solid #e6c3ac; color:#7a3a1a; border-radius:14px; padding:30px; text-align:center;">
      <div style="font-size:15px; margin-bottom:14px;">${escapeHtml(s.resultError)}</div>
      <button data-action="refreshResultados" style="background:#fff; color:#7a3a1a; border:1px solid #e6c3ac; border-radius:8px; padding:9px 16px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;">Reintentar</button>
    </div>`;
  } else if (!hasResults) {
    body = `<div style="background:#fff; border:1px dashed #d8d2c4; border-radius:14px; padding:54px 30px; text-align:center;"><div style="font-size:15px; color:#8a8270;">Aún no hay evaluaciones registradas.</div></div>`;
  } else {
    body = aggGroups.map(g => {
      const memberRows = g.members.map(m => `
        <div style="display:grid; grid-template-columns:1.9fr 1.1fr 0.85fr 0.85fr 0.85fr 1.05fr 0.9fr; gap:8px; padding:11px 10px; align-items:center; border-bottom:1px solid #f2ecdf;">
          <div style="font-size:14.5px; font-weight:600; color:#23324d;">${escapeHtml(m.name)}</div>
          <div style="font-size:12.5px; color:#8a8270; font-variant-numeric:tabular-nums;">${escapeHtml(m.rut)}</div>
          <div style="text-align:center; font-size:14px; color:#4a4636;">${m.desempeno}</div>
          <div style="text-align:center; font-size:14px; color:#4a4636;">${m.cumplimiento}</div>
          <div style="text-align:center; font-size:14px; color:#4a4636;">${m.equipo}</div>
          <div style="text-align:center;"><span style="display:inline-block; font-family:'Source Serif 4', serif; font-size:16px; font-weight:700; color:#fff; background:${m.notaColor}; border-radius:7px; padding:3px 11px;">${m.notaFinal}</span></div>
          <div style="text-align:center; font-size:14px; color:#4a4636; font-weight:600;">${m.contribucion}</div>
        </div>`).join('');

      const obsHtml = g.hasObs ? `
        <div style="margin-top:16px; background:#f6f4ee; border-radius:10px; padding:14px 16px;">
          <div style="font-size:11px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:#8a8270; margin-bottom:8px;">Observaciones (${g.obsCount})</div>
          ${g.obs.map(o => `<div style="font-size:13.5px; line-height:1.5; color:#524d3f; padding:5px 0; border-top:1px solid #ece6d8;">${escapeHtml(o)}</div>`).join('')}
        </div>` : '';

      return `
        <div style="background:#fff; border:1px solid #e2ddd2; border-radius:14px; padding:22px 24px; margin-bottom:18px; box-shadow:0 1px 2px rgba(30,40,60,0.04);">
          <div style="display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:16px;">
            <div style="font-family:'Source Serif 4', serif; font-size:19px; font-weight:600;">${escapeHtml(g.title)}</div>
            <div style="font-size:13px; color:#7a7362;">${g.evaluators} evaluadores · promedio grupo <strong style="color:#2a4a7f; font-size:15px;">${g.notaGrupo}</strong></div>
          </div>
          <div style="overflow-x:auto;">
            <div style="min-width:760px;">
              <div style="display:grid; grid-template-columns:1.9fr 1.1fr 0.85fr 0.85fr 0.85fr 1.05fr 0.9fr; gap:8px; padding:8px 10px; font-size:11px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; color:#8a8270; border-bottom:1px solid #e8e2d4;">
                <div>Integrante</div><div>RUT</div><div style="text-align:center;">Desemp.</div><div style="text-align:center;">Cumpl.</div><div style="text-align:center;">Equipo</div><div style="text-align:center;">Nota final</div><div style="text-align:center;">% Contrib.</div>
              </div>
              ${memberRows}
            </div>
          </div>
          ${obsHtml}
        </div>`;
    }).join('');
  }

  return `
    <div style="width:100%; max-width:1040px;">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
        <div>
          <div style="font-family:'Source Serif 4', serif; font-size:24px; font-weight:600;">Resultados por grupo</div>
          <div style="font-size:13px; color:#7a7362; margin-top:3px;">${s.responses.length} evaluaciones registradas · modo docente</div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button data-action="refreshResultados" style="background:#fff; color:#4a4636; border:1px solid #d8d2c4; border-radius:9px; padding:10px 16px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;">↻ Actualizar</button>
          <button data-action="exportCSV" style="background:#2a7d5b; color:#fff; border:none; border-radius:9px; padding:10px 16px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;">Exportar CSV</button>
          <button data-action="exportJSON" style="background:#fff; color:#4a4636; border:1px solid #d8d2c4; border-radius:9px; padding:10px 16px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;">Exportar respaldo</button>
          <label style="background:#fff; color:#4a4636; border:1px solid #d8d2c4; border-radius:9px; padding:10px 16px; font-size:13px; font-weight:600; cursor:pointer;">Importar respaldo<input type="file" accept="application/json,.json" data-action="importJSON" style="display:none;"></label>
          <button data-action="goInicio" style="background:#fff; color:#4a4636; border:1px solid #d8d2c4; border-radius:9px; padding:10px 16px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;">← Volver</button>
        </div>
      </div>
      ${body}
    </div>`;
}

/* =========================================================================
   DELEGACIÓN DE EVENTOS
   ========================================================================= */
function patchStartButton() {
  const s = state;
  const membersExist = !!(roster[s.carrera] && roster[s.carrera][s.grupo]);
  const startOk = s.nombre.trim() && rutValido(s.rut) && s.carrera && s.grupo && membersExist;
  const btn = document.getElementById('start-btn');
  if (!btn) return;
  btn.disabled = !startOk;
  btn.style.cursor = startOk ? 'pointer' : 'not-allowed';
  btn.style.background = startOk ? '#2a4a7f' : '#c7cdd6';
}

function onAppClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  switch (action) {
    case 'goResultados': goResultados(); break;
    case 'selectCarrera': setState({ carrera: el.dataset.code, grupo: '' }); break;
    case 'selectGrupo': setState({ grupo: el.dataset.grupo }); break;
    case 'startEval': if (!el.disabled) startEval(); break;
    case 'prevMember': prevMember(); break;
    case 'nextMember': nextMember(); break;
    case 'backToEval': setState({ screen: 'eval' }); break;
    case 'goRevision': setState({ screen: 'revision' }); break;
    case 'backToObs': setState({ screen: 'observaciones' }); break;
    case 'submit': if (!el.disabled) submit(); break;
    case 'retrySubmit': retrySubmit(); break;
    case 'downloadOwn': downloadOwn(); break;
    case 'restart': restart(); break;
    case 'exportCSV': exportCSV(); break;
    case 'exportJSON': exportJSON(); break;
    case 'refreshResultados': refreshResultados(); break;
    case 'goInicio': goInicio(); break;
  }
}

function onAppInput(e) {
  const el = e.target;
  if (!el.dataset) return;
  const action = el.dataset.action;
  if (action === 'nombreInput') { state.nombre = el.value; patchStartButton(); }
  else if (action === 'rutInput') { state.rut = el.value; patchStartButton(); }
  else if (action === 'obsInput') { state.observaciones = el.value; }
  else if (action === 'ratingInput') {
    const key = el.dataset.key;
    const val = parseFloat(el.value);
    setCurrentRating(key, val);
    const meta = criterios.find(c => c.key === key);
    const display = meta.type === 'pct' ? pctFmt(val) : notaFmt(val);
    const labelEl = document.getElementById('crit-display-' + key);
    if (labelEl) labelEl.textContent = display;
  }
}

function onAppChange(e) {
  const el = e.target;
  if (el.dataset && el.dataset.action === 'importJSON') {
    const file = el.files && el.files[0];
    if (file) importJSONFile(file);
    el.value = '';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const app = document.getElementById('app');
  app.addEventListener('click', onAppClick);
  app.addEventListener('input', onAppInput);
  app.addEventListener('change', onAppChange);
  render();
});
</script>
</body>
</html>
